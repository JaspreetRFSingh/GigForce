spring:
  application:
    name: gigforce

  datasource:
    url: jdbc:h2:mem:gigforcedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  cache:
    type: simple

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16

app:
  jwt:
    secret: Z2lnZm9yY2Utc3VwZXItc2VjcmV0LWp3dC1rZXktZm9yLWxvY2FsLWRldi0yMDI0
    expiration: 86400000

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    com.gigforce: DEBUG
    org.springframework.security: WARN
